<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라이프마케팅실</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: linear-gradient(155deg, #F7F2ED 0%, #EDF1F7 100%); min-height: 100vh; }
    button { font-family: inherit; }
    input, select { font-family: inherit; }

    /* ── 회식 섹션 스타일 ── */
    .dinner-info-banner {
      background: linear-gradient(135deg, #3A2310, #6B3D18);
      border-radius: 16px;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 28px;
      box-shadow: 0 6px 24px rgba(90,40,10,0.18);
    }
    .dinner-info-banner .info-block { display: flex; align-items: center; gap: 12px; }
    .dinner-info-banner .info-icon { font-size: 22px; }
    .dinner-info-banner .info-label { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
    .dinner-info-banner .info-value { font-size: 16px; color: #fff; font-weight: 800; }
    .dinner-info-banner .info-tba { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 700; letter-spacing: 0.05em; }
    .dinner-divider { width: 1px; height: 40px; background: rgba(255,255,255,0.2); }

    .d-tab-wrap { display: flex; gap: 6px; justify-content: flex-start; margin-bottom: 24px; }
    .d-tab { padding: 8px 24px; border-radius: 20px; border: 1.5px solid #E4DDD4; background: #fff; color: #9a8f87; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .d-tab:hover { border-color: #B87A4A; color: #B87A4A; }
    .d-tab.active { background: #B87A4A; border-color: #B87A4A; color: #fff; }

    .d-tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; justify-items: center; }
    .d-table-card { background: #fff; border: 1px solid #e4ddd4; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 14px rgba(0,0,0,0.07); transition: transform 0.18s, box-shadow 0.18s; }
    .d-table-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.11); }
    .d-table-header { padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0ebe5; }
    .d-table-num { font-family: 'DM Mono', monospace; font-size: 11px; color: #b0a89e; letter-spacing: 1px; margin-bottom: 2px; }
    .d-table-title { font-weight: 800; font-size: 15px; color: #2d2520; }
    .d-seat-count { font-size: 12px; background: rgba(0,0,0,0.06); color: #9a8f87; padding: 3px 11px; border-radius: 20px; font-weight: 700; }
    .d-members { padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
    .d-member { display: flex; align-items: center; gap: 8px; padding: 6px 9px; border-radius: 9px; background: #faf7f4; border: 1px solid transparent; font-size: 13px; transition: all 0.15s; }
    .d-member:hover { background: #f2ede8; border-color: #e4ddd4; }
    .d-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .d-name { flex: 1; font-weight: 700; color: #2d2520; }
    .d-team { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 700; letter-spacing: 0.2px; }
    .d-gender { font-size: 11px; font-weight: 800; }
    .d-gender.m { color: #4A7FB5; }
    .d-gender.f { color: #B05A7A; }
    .d-leader { font-size: 10px; color: #fff; background: #C4955A; padding: 2px 7px; border-radius: 5px; font-weight: 800; }

    /* 범례 */
    .d-legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; margin-bottom: 22px; }
    .d-legend-item { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #e4ddd4; border-radius: 20px; padding: 5px 13px; font-size: 12px; color: #2d2520; font-weight: 600; }

    /* 자리배치 이미지 영역 */
    .seat-image-section { max-width: 900px; margin: 32px auto 0; text-align: left; }
    .seat-image-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .seat-image-bar { width: 4px; height: 22px; background: linear-gradient(#B87A4A, #5A7A6A); border-radius: 4px; }
    .seat-image-title { font-size: 15px; font-weight: 800; color: #1a1a1a; }
    .seat-image-placeholder { border: 2px dashed #D4C8BC; border-radius: 16px; background: #FDFAF7; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 220px; gap: 10px; color: #b0a89e; }
    .seat-image-placeholder .ph-icon { font-size: 40px; opacity: 0.5; }
    .seat-image-placeholder .ph-text { font-size: 14px; font-weight: 700; }
    .seat-image-placeholder .ph-sub { font-size: 12px; opacity: 0.7; }
    .seat-image-box { border-radius: 16px; overflow: hidden; border: 1px solid #e4ddd4; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    .seat-image-box img { width: 100%; display: block; }

    @media(max-width: 600px) {
      .d-tables-grid { grid-template-columns: 1fr; }
      .dinner-info-banner { flex-direction: column; }
      .dinner-divider { display: none; }
    }
  </style>
</head>
<body>

    const TEAM_OPTIONS = [
      { id: "",    label: "미배정",     color: "#aaa",    bg: "#f5f5f5" },
      { id: "mk1", label: "마케팅 1팀", color: "#B87A4A", bg: "#FDF0E6" },
      { id: "mk3", label: "마케팅 3팀", color: "#B87A4A", bg: "#FDF3E8" },
      { id: "mk2", label: "마케팅 2팀", color: "#4A7FB5", bg: "#EBF3FB" },

    ];

    const initialProducts = [
      { id:"p1",  quarter:"1Q 2026",    name:"종아리편한케어 Sub",       openDate:"2026-02-02", manager:"이예은", teamId:"mk3", type:"sub"    },
      { id:"p2",  quarter:"1Q 2026",    name:"발편한케어 V2",             openDate:"2026-02-23", manager:"이예은", teamId:"mk3", type:"main"   },
      { id:"p3",  quarter:"1Q 2026",    name:"목 마사지 베개 V2",         openDate:"2026-03-30", manager:"이예은", teamId:"mk1", type:"main"   },
      { id:"p4",  quarter:"2Q 2026",    name:"골반 마사지기",             openDate:"2026-04-27", manager:"김민경", teamId:"mk3", type:"main"   },
      { id:"p5",  quarter:"2Q 2026",    name:"마그네슘 시너지 크림 GWP",  openDate:"2026-04-13", manager:"김민경", teamId:"",    type:"gwp"    },
      { id:"p6",  quarter:"2Q 2026",    name:"팔꿈치 마사지기",           openDate:"2026-05-11", manager:"김민경", teamId:"mk3", type:"main"   },
      { id:"p7",  quarter:"2Q 2026",    name:"바디 풀고컷",               openDate:"2026-05-26", manager:"김민경", teamId:"bm",  type:"main",  coTeam:"mk2" },
      { id:"p8",  quarter:"2Q 2026",    name:"트리플 샷 시너지 젤 GWP",   openDate:"2026-05-13", manager:"김민경", teamId:"",    type:"gwp"    },
      { id:"p9",  quarter:"2Q 2026",    name:"훌라핏 벨트",               openDate:"2026-05-27", manager:"김민경", teamId:"bm",  type:"main",  coTeam:"mk2" },
      { id:"p10", quarter:"2Q 2026",    name:"허리 마사지기 V3",           openDate:"2026-06-15", manager:"배지연", teamId:"mk3", type:"main"   },
      { id:"p11", quarter:"2Q 2026",    name:"넥코어 목 마사지기",         openDate:"2026-08-17", manager:"배지연", teamId:"mk2", type:"main"   },
      { id:"p12", quarter:"3Q-4Q 2026", name:"겨울 시즌 상품",            openDate:"TBD",        manager:"",      teamId:"",    type:"season" },
      { id:"p13", quarter:"1Q 2027",    name:"무릎 마사지기",             openDate:"2027-01",    manager:"이예은", teamId:"mk3", type:"main"   },
      { id:"p14", quarter:"1Q 2027",    name:"베개 마사지기",             openDate:"2027-02",    manager:"이예은", teamId:"mk1", type:"main"   },
    ];

    const roleConfig = {
      "팀장":            { color: "#7C3E0E", bg: "#FEF0E6" },
      "퍼포먼스 마케터": { color: "#1A4F8A", bg: "#E8F0FA" },
      "CRM 마케터":      { color: "#1A4F8A", bg: "#E8F0FA" },
      "마케터":          { color: "#2D5A8A", bg: "#EBF3FB" },
      "콘텐츠마케터":    { color: "#2D6B3A", bg: "#E8F5EC" },
      "콘텐츠기획자":    { color: "#6B4E1A", bg: "#FBF3E4" },
      "영상 PD":         { color: "#6A2D8A", bg: "#F4EBF9" },
      "온사이트마케터":  { color: "#1A6A5A", bg: "#E4F5F1" },
      "바이럴마케터":    { color: "#5A1A7A", bg: "#F2E8FA" },
      "데이터엔지니어":  { color: "#1A5A6A", bg: "#E4F0F5" },
      "웹퍼블리셔":      { color: "#6A2D4A", bg: "#F5E8EF" },
      "MD":              { color: "#3A5A3A", bg: "#E8F4E8" },
    };

    function getRoleConf(role) {
      if (roleConfig[role]) return roleConfig[role];
      for (const key of Object.keys(roleConfig)) {
        if (role.includes(key)) return roleConfig[key];
      }
      return { color: "#555", bg: "#f0f0f0" };
    }

    const typeConfig = {
      main:   { label: "Main",  color: "#2D5A8A", bg: "#EBF3FB" },
      sub:    { label: "Sub",   color: "#5A7A3A", bg: "#EDF5E4" },
      gwp:    { label: "GWP",   color: "#7A5A2A", bg: "#FBF3E4" },
      season: { label: "시즌",  color: "#6A3A8A", bg: "#F4EBF9" },
    };

    const editBtnStyle = (color) => ({
      width: 22, height: 22, borderRadius: 5,
      border: `1px solid ${color}44`, background: `${color}12`,
      color, fontSize: 12, fontWeight: 800, cursor: "pointer",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: 0, lineHeight: 1,
    });

    function EditableText({ value, onChange, style, placeholder }) {
      return (
        <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
          style={{
            border: "1.5px dashed #AACCEE", borderRadius: 5, padding: "2px 6px",
            fontSize: "inherit", fontWeight: "inherit", fontFamily: "inherit",
            color: "inherit", background: "#F0F7FF", outline: "none",
            width: "100%", boxSizing: "border-box", ...style,
          }}
        />
      );
    }

    function MemberRow({ member, isLeader, teamColor, editMode, onChange, onDelete, onAddBelow }) {
      const conf = getRoleConf(isLeader ? "팀장" : member.role);
      return (
        <div style={{
          display: "flex", alignItems: "flex-start", gap: 8,
          padding: isLeader ? "10px 10px" : "7px 10px",
          background: isLeader ? `${teamColor}12` : "#FAFAFA",
          border: isLeader ? `1.5px solid ${teamColor}55` : "1px solid #EBEBEB",
          borderRadius: 9, marginBottom: 5,
        }}>
          <div style={{
            width: isLeader ? 34 : 28, height: isLeader ? 34 : 28, borderRadius: "50%",
            background: isLeader ? `linear-gradient(135deg, ${teamColor}, ${teamColor}99)` : `${conf.color}20`,
            border: isLeader ? `2px solid ${teamColor}` : `1.5px solid ${conf.color}44`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: isLeader ? 14 : 11, fontWeight: 800,
            color: isLeader ? "#fff" : conf.color, flexShrink: 0, marginTop: 2,
          }}>
            {(member.name || "?")[0]}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              {editMode && !isLeader
                ? <EditableText value={member.name} onChange={v => onChange({ ...member, name: v })} style={{ fontSize: 13, fontWeight: 700, maxWidth: 80 }} placeholder="이름" />
                : <span style={{ fontWeight: isLeader ? 800 : 700, fontSize: isLeader ? 14 : 13, color: "#111" }}>{member.name}</span>
              }
              {editMode && !isLeader
                ? <EditableText value={member.role} onChange={v => onChange({ ...member, role: v })} style={{ fontSize: 10, fontWeight: 700, maxWidth: 120, color: conf.color }} placeholder="직무" />
                : <span style={{ fontSize: 10, fontWeight: 700, color: isLeader ? teamColor : conf.color, background: isLeader ? `${teamColor}18` : conf.bg, padding: "2px 8px", borderRadius: 20, border: `1px solid ${isLeader ? teamColor : conf.color}33` }}>
                    {isLeader ? `팀장 · ${member.subRole}` : member.role}
                  </span>
              }
              {isLeader && member.note === "신규" && (
                <span style={{ fontSize: 9, fontWeight: 800, color: "#fff", background: "#E74C3C", padding: "2px 7px", borderRadius: 20 }}>NEW</span>
              )}
            </div>
            {editMode && !isLeader
              ? <EditableText value={member.note || ""} onChange={v => onChange({ ...member, note: v || undefined })} style={{ fontSize: 10, marginTop: 4, maxWidth: 200 }} placeholder="메모 (선택)" />
              : member.note
                ? <div style={{ marginTop: 4, display: "inline-flex", alignItems: "center", gap: 4, fontSize: 10,
                    color: member.note === "프리랜서" ? "#5A6A8A" : "#C0392B",
                    background: member.note === "프리랜서" ? "#EEF2FA" : "#FFF0EE",
                    padding: "2px 8px", borderRadius: 6, fontWeight: 600,
                    border: member.note === "프리랜서" ? "1px solid #C0CCE0" : "1px solid #F5C6C2" }}>
                    {member.note === "프리랜서" ? "🔗" : "⚠️"} {member.note}</div>
                : null
            }
          </div>
          {editMode && !isLeader && (
            <div style={{ display: "flex", flexDirection: "column", gap: 3, flexShrink: 0 }}>
              <button onClick={onAddBelow} style={editBtnStyle("#2D6B3A")}>+</button>
              <button onClick={onDelete} style={editBtnStyle("#C0392B")}>✕</button>
            </div>
          )}
        </div>
      );
    }

    function TeamCard({ team, editMode, onTeamChange }) {
      const [open, setOpen] = useState(true);
      const total = 1 + team.members.length;
      const updateMember = (i, u) => { const m = [...team.members]; m[i] = u; onTeamChange({ ...team, members: m }); };
      const deleteMember = (i) => onTeamChange({ ...team, members: team.members.filter((_, j) => j !== i) });
      const addMemberAfter = (i) => { const m = [...team.members]; m.splice(i + 1, 0, { name: "이름", role: "직무" }); onTeamChange({ ...team, members: m }); };
      const updateProduct = (i, v) => { const p = [...team.products]; p[i] = v; onTeamChange({ ...team, products: p }); };
      const deleteProduct = (i) => onTeamChange({ ...team, products: team.products.filter((_, j) => j !== i) });

      return (
        <div style={{ background: "#fff", borderRadius: 16, overflow: "hidden", boxShadow: "0 4px 24px rgba(0,0,0,0.07)", border: `1.5px solid ${editMode ? "#AACCEE" : team.color + "33"}`, minWidth: 255, flex: "1 1 255px", maxWidth: 310 }}>
          <div style={{ background: `linear-gradient(140deg, ${team.color} 0%, ${team.color}BB 100%)`, padding: "14px 16px 12px", cursor: editMode ? "default" : "pointer", userSelect: "none" }} onClick={() => !editMode && setOpen(o => !o)}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                {editMode
                  ? <input value={team.name} onChange={e => onTeamChange({ ...team, name: e.target.value })} style={{ background: "rgba(255,255,255,0.25)", border: "1.5px dashed rgba(255,255,255,0.7)", borderRadius: 6, color: "#fff", fontWeight: 800, fontSize: 16, padding: "2px 8px", outline: "none", width: 140 }} />
                  : <div style={{ color: "#fff", fontWeight: 800, fontSize: 17 }}>{team.name}</div>
                }
                {team.subtitle && <div style={{ color: "rgba(255,255,255,0.78)", fontSize: 11, fontWeight: 600, marginTop: 2 }}>({team.subtitle})</div>}
              </div>
              <span style={{ background: "rgba(255,255,255,0.22)", color: "#fff", fontSize: 10, fontWeight: 700, padding: "3px 9px", borderRadius: 20 }}>{total}명</span>
            </div>
